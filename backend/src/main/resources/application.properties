server.port=${PORT:8080}

spring.application.name=healthform

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:healthformdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

frontend.url=${FRONTEND_URL:http://localhost:3000}

# Security / JWT
jwt.secret=${JWT_SECRET:change-me-please-use-a-strong-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Default admin credentials (override in production via environment variables)
admin.username=${ADMIN_USERNAME:admin@example.com}
admin.password=${ADMIN_PASSWORD:12345678}
doctor.username=${DOCTOR_USERNAME:doctor@example.com}
doctor.password=${DOCTOR_PASSWORD:12345678}
