server.port=${PORT:8080}

spring.application.name=healthform

# Vercel PostgreSQL database connection
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

frontend.url=${FRONTEND_URL:http://localhost:3000}

# Security / JWT
jwt.secret=${JWT_SECRET:change-me-please-use-a-strong-secret}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Default admin credentials (override in production via environment variables)
admin.username=${ADMIN_USERNAME:admin@example.com}
admin.password=${ADMIN_PASSWORD:12345678}
doctor.username=${DOCTOR_USERNAME:doctor@example.com}
doctor.password=${DOCTOR_PASSWORD:12345678}
