services:
  - type: web
    name: patient-health-backend
    runtime: docker
    rootDir: backend
    healthCheckPath: /api
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: patient-health-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: patient-health-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: patient-health-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 3600000
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DOCTOR_USERNAME
        sync: false
      - key: DOCTOR_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://clinic-health-form-system.onrender.com

  - type: web
    name: patient-health-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://clinic-health-backend.onrender.com/api

databases:
  - name: patient-health-db
    databaseName: patient_forms_db
    user: patient_forms_user
