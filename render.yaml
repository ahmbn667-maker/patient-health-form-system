services:
  - type: web
    name: ahmed-al-saadi-backend
    runtime: docker
    rootDir: backend
    healthCheckPath: /api
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: ahmed-al-saadi-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: ahmed-al-saadi-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ahmed-al-saadi-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 3600000
      - key: ADMIN_USERNAME
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: 12345678
      - key: DOCTOR_USERNAME
        value: doctor@example.com
      - key: DOCTOR_PASSWORD
        value: 12345678
      - key: FRONTEND_URL
        value: https://ahmed-al-saadi.onrender.com

  - type: web
    name: ahmed-al-saadi
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ahmed-al-saadi-backend.onrender.com/api

databases:
  - name: ahmed-al-saadi-db
    databaseName: ahmed_al_saadi_db
    user: ahmed_al_saadi_user
