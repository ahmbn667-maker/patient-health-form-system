services:
  postgres:
    image: postgres:16-alpine
    container_name: patient_forms_postgres
    environment:
      POSTGRES_DB: patient_forms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - patient_forms_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: patient_forms_backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_forms_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: change-me-please-use-a-strong-secret
      JWT_EXPIRATION_MS: 3600000
      ADMIN_USERNAME: admin@example.com
      ADMIN_PASSWORD: 12345678
      DOCTOR_USERNAME: doctor@example.com
      DOCTOR_PASSWORD: 12345678
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: patient_forms_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  patient_forms_data:
